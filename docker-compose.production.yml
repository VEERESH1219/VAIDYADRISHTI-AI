version: "3.9"

services:
  postgres:
    ports: []
    healthcheck:
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    ports: []
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    ports: []
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s

  worker:
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: vaidya_proxy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

